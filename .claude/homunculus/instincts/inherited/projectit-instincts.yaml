# Projectit Workflow Add Database Entity And Api

## Action

Follow the add-database-entity-and-api workflow:
1. Create migration SQL file in server/src/db/migrations/
2. Update migration runner (server/src/db/migrate.js)
3. Register new entity in server/src/routes/entities.js
4. Implement or update service logic in server/src/services/
5. Add or update API routes in server/src/routes/functions/

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: server/src/db/migrations/*.sql, server/src/db/migrate.js, server/src/routes/entities.js

