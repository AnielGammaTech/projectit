# Projectit Workflow Add New Feature Page

## Action

Follow the add-new-feature-page workflow:
1. Create new page file in src/pages/ (e.g., AssetReports.jsx)
2. Optionally create or update supporting component(s) in src/components/
3. Register new page in src/pages.config.js or navigation (e.g., src/Layout.jsx)
4. Apply branding or shell wrapper if needed

## Evidence

- Workflow detected from commit patterns
- Frequency: ~5x per month
- Files: src/pages/*.jsx, src/components/assets/*.jsx, src/pages.config.js

